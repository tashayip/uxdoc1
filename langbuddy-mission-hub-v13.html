<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LangBuddy Mission Hub Moved</title>
<meta http-equiv="refresh" content="2; url=langbuddy-mission-hub.html">
<link rel="canonical" href="langbuddy-mission-hub.html">
<style>
:root {
  --bg: #f4f6f9;
  --surface: #ffffff;
  --border: #e2e8f0;
  --ink: #0f172a;
  --muted: #64748b;
  --blue: #0c9fe5;
  --blue-dk: #0780b8;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  font-family: Inter, system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
}
.card {
  width: min(100%, 560px);
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  box-shadow: 0 2px 8px rgba(0,0,0,.05), 0 12px 32px rgba(0,0,0,.06);
}
.eyebrow {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--blue-dk);
}
h1 {
  margin: 10px 0 8px;
  font-size: 28px;
  line-height: 1.15;
}
p {
  margin: 0 0 14px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--muted);
}
a {
  color: var(--blue-dk);
  font-weight: 600;
}
a:hover {
  color: var(--blue);
}
.small {
  font-size: 13px;
}
</style>
<script>
window.setTimeout(function () {
  window.location.replace("langbuddy-mission-hub.html");
}, 1500);
</script>
</head>
<body>
  <main class="card">
    <div class="eyebrow">LangBuddy</div>
    <h1>This page has moved.</h1>
    <p>You’ll be redirected to the latest Mission Hub page automatically.</p>
    <p><a href="langbuddy-mission-hub.html">Open langbuddy-mission-hub.html</a></p>
    <p class="small">If the redirect does not happen, use the link above.</p>
  </main>
</body>
</html>
